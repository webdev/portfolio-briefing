# --- OVERRIDE Example ---
# Use when: You want to change a decision parameter for this position

directive_id: dir_20260507_amd_override_c4d9
type: OVERRIDE
status: ACTIVE
created_at: 2026-05-07T09:30:00-04:00
created_via: cli
reason: "High conviction; want to ride this one further."

target:
  kind: option_position
  identifier: "AMD  260516P00180000"

parameter: take_profit_threshold             # What parameter to override
new_value: 0.80                              # New value (any type)
old_value: 0.50                              # Original value (for audit trail)

expires:
  trigger: position_closed
  position_identifier: "AMD  260516P00180000"

status_history:
  - at: 2026-05-07T09:30:00-04:00
    status: ACTIVE
    reason: created

