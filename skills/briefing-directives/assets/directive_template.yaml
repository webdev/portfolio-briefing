# --- WATCH_ONLY Example ---
# Use when: Surface in briefing but don't generate action until trigger fires

directive_id: dir_20260507_nvda_watch_d6f3
type: WATCH_ONLY
status: ACTIVE
created_at: 2026-05-07T09:30:00-04:00
created_via: cli
reason: "Want to see daily close above $185 before entering."

target:
  kind: new_idea
  symbol: NVDA
  source_screener: vcp-screener

expires:
  trigger: price_above
  symbol: NVDA
  level: 185.00

status_history:
  - at: 2026-05-07T09:30:00-04:00
    status: ACTIVE
    reason: created

