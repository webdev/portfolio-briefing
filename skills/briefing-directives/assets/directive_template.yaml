type: MANUAL
status: ACTIVE
created_at: 2026-05-07T09:30:00-04:00
created_via: cli
reason: "Managing MSFT calls manually for now."

target:
  kind: position_scope
  symbol: MSFT
  position_type: short_call                  # Optional: short_call | short_put | long_call | long_put

expires:
  trigger: open_ended                        # open_ended: no auto-expiry, will prompt after 30 days

status_history:
  - at: 2026-05-07T09:30:00-04:00
    status: ACTIVE
    reason: created

