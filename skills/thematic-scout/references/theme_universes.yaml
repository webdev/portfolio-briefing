# Thematic universes for the thematic-scout skill.
#
# Each theme has:
#   name      — human label rendered in the report
#   group     — optional parent grouping (e.g. "AI Buildout") for the renderer
#   anchors   — tickers to analyze (curated list of leaders + emerging names)
#   etfs      — relevant ETFs (rendered as benchmarks in the report)
#   notes     — one-line thematic context
#
# Order in this file is the order in the report. The first five themes
# below are the "AI Buildout" pillars (Semis → Memory → Photonics → Data
# Centers → Power). Quantum and Cybersecurity follow as adjacent themes.

themes:
  semis:
    name: "Semis"
    group: "The AI Buildout"
    anchors:
      - NVDA   # AI compute leader
      - AMD    # GPU + datacenter
      - INTC   # foundry comeback + foundational CPU
      - ASML   # EUV lithography monopoly
      - TSM    # foundry monopoly
      - ARM    # IP licensing for AI inference
      - AVGO   # AI ASIC + networking
      - MRVL   # custom ASIC
      - QCOM   # mobile + automotive + edge
      - TXN    # analog / power management
      - SMCI   # AI server builder
    etfs: [SMH, SOXX, QQQ]
    notes: "Hyperscaler capex cycle, Claude / GPT compute demand"

  memory_storage:
    name: "Memory & Storage"
    group: "The AI Buildout"
    anchors:
      - SNDK   # SanDisk parent (re-spin)
      - MU     # micron — HBM + DRAM
      - STX    # seagate — HDD
      - WDC    # western digital — NAND + HDD
    etfs: []
    notes: "HBM ramp for AI, NAND price recovery, hyperscale storage"

  photonics_optics:
    name: "Photonics & Optics"
    group: "The AI Buildout"
    anchors:
      - NOK    # nokia — optical networking infra
      - LITE   # lumentum — optical modules
      - COHR   # coherent — optical components
      - AAOI   # applied optoelectronics
      - GLW    # corning — fiber + glass
      - CIEN   # ciena — optical networking
      - FN     # fabrinet — contract manufacturing for optics
    etfs: []
    notes: "AI cluster interconnect demand (CPO, co-packaged optics)"

  ai_data_centers:
    name: "AI Data Centers"
    group: "The AI Buildout"
    anchors:
      - NBIS   # nebius — Yandex-spinoff AI cloud
      - IREN   # iris energy — miner → AI hosting
      - CRWV   # coreweave — AI hyperscaler
      - CIFR   # cipher mining — miner / AI infra
      - WULF   # terawulf — miner / AI hosting
    etfs: []
    notes: "Bitcoin miners pivoting to AI infrastructure / GPU hosting"

  power:
    name: "Power"
    group: "The AI Buildout"
    anchors:
      - CEG    # constellation — pure-play nuclear baseload
      - BE     # bloom energy — solid oxide fuel cells
      - VRT    # vertiv — datacenter cooling/power
      - NVTS   # navitas — GaN/SiC power semis
      - OKLO   # small modular reactor (SMR)
      - UUUU   # energy fuels — uranium miner
      - GEV    # GE Vernova — grid + turbines
      - LEU    # centrus energy — uranium enrichment
      - EOSE   # eos energy — zinc-based grid storage
      - SMR    # NuScale — SMR
      - ETN    # eaton — power management
    etfs: [URA, NLR, XLU]
    notes: "Datacenter power demand → nuclear renaissance, grid buildout"

  # Adjacent themes (not part of AI Buildout but worth tracking)

  quantum:
    name: "Quantum Computing"
    group: "Adjacent"
    anchors:
      - IONQ   # trapped-ion
      - RGTI   # rigetti — superconducting
      - QBTS   # d-wave — annealing
      - IBM    # superconducting (one of many bets)
      - HON    # honeywell — Quantinuum stake
    etfs: [QTUM]
    notes: "Early stage; high vol, mostly thematic"

  cybersecurity:
    name: "Cybersecurity"
    group: "Adjacent"
    anchors:
      - CRWD   # crowdstrike — endpoint
      - PANW   # palo alto — platform
      - ZS     # zscaler — SASE
      - S      # sentinelone — endpoint challenger
      - NET    # cloudflare — edge + zero trust
      - OKTA   # identity
      - FTNT   # fortinet — firewalls + SASE
      - CYBR   # cyberark — privileged access
    etfs: [HACK, CIBR]
    notes: "Cloud-native security shift, SASE/zero trust"

# Verdict thresholds — same logic as long-term-opportunity-advisor but tuned
# for outbound research (slightly more permissive on WATCH).
verdict:
  rsi_oversold: 35
  rsi_overheated: 75
  drawdown_oversold_pct: 10
  drawdown_thesis_broken_pct: 30
  sma_within_pct: 5
  csp_target_otm_pct: 10
  csp_target_dte: 35
  iv_rank_elevated: 50
