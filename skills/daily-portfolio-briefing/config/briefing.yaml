# Briefing Configuration Template
# Copy to state/briefing_config.yaml and customize

# Account scope. The briefing pipeline analyzes ONLY accounts whose
# accountDesc matches one of these entries (case-insensitive, exact match).
# The user has multiple E*TRADE accounts (Joint, Individual Brokerage,
# INDIVIDUAL, IRAs) but currently only INDIVIDUAL is in scope — see CLAUDE.md.
# To widen later, add more entries (e.g. ["INDIVIDUAL", "ROTH IRA"]).
account_desc_whitelist:
  - INDIVIDUAL

enabled_strategies:
  - wheel              # covered calls + cash-secured puts
  - dividend_growth    # pullback entry on dividend growers (optional)
  - swing              # short-term mean-reversion (optional)

# Screeners: which ones to run and how often
screeners:
  value_dividend_screener:
    enabled: true
    frequency: every_run    # or: weekly, monthly
  earnings_trade_analyzer:
    enabled: false
    frequency: weekly
  pead_screener:
    enabled: false
    frequency: weekly
  pair_trade_screener:
    enabled: false
    frequency: monthly

# Risk parameters
risk:
  max_position_pct: 0.10          # Max 10% NLV in any single name
  max_sector_pct: 0.35            # Max 35% NLV in any sector
  max_portfolio_risk_pct: 0.15    # Max 15% NLV at risk (stop loss) at any time
  leverage_cap: 1.0               # 1.0 = no margin, 1.5 = 50% leverage

# Core positions: long-term holdings with significant unrealized gains.
# The briefing treats these specially:
#   1. Prefer DIAGONAL UP rolls (raise cap) over CALENDAR rolls (extend at same cap),
#      since assignment would trigger a large taxable event.
#   2. Trigger DEFENSIVE COLLAR proposals when concentration > 10% AND embedded tax > 2% NLV.
#   3. Show estimated tax cost on every action that would lead to assignment.
core_positions:
  - GOOG
  - GOOGL
  - NVDA
  - MSFT
  - VRT
  - ADBE
  - AMZN
  - META
  # Add TSLA here too if you want to treat it as core. Without it, a
  # third-party SELL rec on TSLA will still surface EXIT as Tier 1.

# Concentration caps. Two-tier system:
#   concentration_cap_pct       — non-core trim trigger (default 10%)
#   core_concentration_cap_pct  — soft cap for core holdings: only "roll
#                                 covered calls up" is suggested, never sell
#   core_runaway_cap_pct        — hard cap on core holdings: at this point
#                                 the system flags "REVIEW CORE" with full
#                                 option menu (CC roll / partial sale / collar)
concentration_cap_pct: 10
core_concentration_cap_pct: 18
core_runaway_cap_pct: 22

# Long-term-opportunity-advisor target weights:
#   default_target_weight_pct — non-core (5%). LT TRIM triggers at 1.5× = 7.5%
#   core_target_weight_pct    — core (12%). LT TRIM triggers at 1.5× = 18%
#                                Prevents mega-cap conviction holdings from
#                                being flagged as overweight at normal sizes.
default_target_weight_pct: 5
core_target_weight_pct: 12

# Tax assumptions for the LTCG-cost estimates above.
# Effective LTCG rate = federal LTCG (20%) + NIIT (3.8%) for high-income.
# Adjust to match user's actual marginal rate. Use 0.15 for moderate income.
ltcg_rate: 0.238
stcg_rate: 0.408                  # 37% federal + 3.8% NIIT

# Account routing
accounts:
  - accountIdKey: "E123456"      # E*TRADE taxable account
    type: TAXABLE
    weight_pct: 45               # 45% of portfolio
    enabled: true

  - accountIdKey: "R789012"      # E*TRADE Roth IRA
    type: ROTH_IRA
    weight_pct: 30               # 30% of portfolio
    enabled: true
    liquidity_minimum_pct: 0.60  # Keep 60% liquid (cash)

  - accountIdKey: "T345678"      # E*TRADE Traditional IRA
    type: TRADITIONAL_IRA
    weight_pct: 25               # 25% of portfolio
    enabled: false
    liquidity_minimum_pct: 0.60

# Wheel strategy parameters
wheel:
  short_put_delta_range: [0.15, 0.30]    # Target 15-30 delta puts
  short_call_delta_range: [0.20, 0.35]   # Target 20-35 delta calls
  min_dte_for_roll: 21                   # Don't roll within 21 days
  loss_trigger_multiple_monthly: 1.40    # Close at 1.40× premium paid
  loss_trigger_multiple_weekly: 1.50     # Close at 1.50× premium paid

# Output
output:
  output_dir: "reports/daily"
  snapshot_dir: "state/briefing_snapshots"
  preserve_days: 90                       # Keep snapshots for 90 days
